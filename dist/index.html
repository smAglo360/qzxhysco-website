<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Cat Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/pixel-cat-portfolio.1303bb05.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero-card">
      <div class="hero-left">
        <span class="hero-badge" data-i18n="hero_badge"></span>
        <h1 class="hero-title" data-i18n="hero_title"></h1>
        <p class="hero-copy" data-i18n="hero_copy"></p>
        <div class="hero-right">
          <div class="cat-sprite" aria-hidden="true"></div>
        </div>
        <div class="hero-actions">
          <a class="btn btn-primary" href="#works" data-i18n="btn_primary"></a>
          <button class="btn btn-secondary" id="theme-toggle" data-i18n="btn_secondary"></button>
          <button class="btn btn-secondary" id="language-toggle"><span class="btn-label"></span></button>
        </div>
      </div>
    </header>

    <main>
      <section id="works" class="section works-section">
        <div class="section-header">
          <div class="section-number" data-i18n="works_number"></div>
          <h2 data-i18n="works_header"></h2>
        </div>
        <div class="thumbnail-grid">
          <article class="thumbnail-card" data-viewer-index="0" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%201.5c9a1aaf.png" alt="Featured work 1"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="1" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%202.a9235127.png" alt="Featured work 2"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="2" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%203.9970dab7.png" alt="Featured work 3"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="3" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%204.3f0b580c.png" alt="Featured work 4"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="4" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%205.12e22058.png" alt="Featured work 5"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="5" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%206.6c248d1f.png" alt="Featured work 6"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="6" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%207.f73d612f.png" alt="Featured work 7"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="7" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%208.7bff3d7b.png" alt="Featured work 8"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="8" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%209.fefa0195.png" alt="Featured work 9"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="9" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%2010.6353037f.png" alt="Featured work 10"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="10" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%2011.9b5486e9.png" alt="Featured work 11"></div>
          </article>
          <article class="thumbnail-card" data-viewer-index="11" data-viewer-group="works">
            <div class="thumbnail-image"><img src="/Picture%2012.f301851d.png" alt="Featured work 12"></div>
          </article>
        </div>
        <p class="thumbnail-note"></p>
      </section>

      <section id="gallery" class="section gallery-section">
        <div class="section-header">
          <div class="section-number" data-i18n="gallery_number"></div>
          <h2 data-i18n="gallery_header"></h2>
        </div>
        <div class="gallery-grid">
          <article class="gallery-card" data-gallery-index="0">
            <div class="gallery-image" aria-hidden="true"><img src="/Picture%201.af6dfc33.png" alt="Studio Snapshot"></div>
          </article>
          <article class="gallery-card" data-gallery-index="1">
            <div class="gallery-image" aria-hidden="true"><img src="/Picture%202.7592c80c.png" alt="Project Preview"></div>
          </article>
          <article class="gallery-card" data-gallery-index="2">
            <div class="gallery-image" aria-hidden="true"><img src="/Picture%203.9bd8f5db.png" alt="Cat Moments"></div>
          </article>
        </div>
        <div class="gallery-viewer hidden" id="gallery-viewer">
          <div class="viewer-frame">
            <div class="viewer-body">
              <button class="btn btn-secondary gallery-nav" id="gallery-prev">←</button>
              <div class="viewer-image" id="gallery-viewer-image"></div>
              <button class="btn btn-secondary gallery-nav" id="gallery-next">→</button>
            </div>
            <div class="viewer-footer">
              <div class="viewer-text-block">
                <h3 id="gallery-viewer-title"></h3>
                <p id="gallery-viewer-text"></p>
              </div>
              <button class="btn btn-secondary gallery-close" id="gallery-close" data-i18n="gallery_close">Close</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <p data-i18n="footer_text"></p>
    </footer>
  </div>
  <script src="/pixel-cat-portfolio.672d4772.js"></script>


<script src="/pixel-cat-portfolio.3464ddca.js"></script></body></html>
